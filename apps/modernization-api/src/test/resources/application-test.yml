nbs:
  max-page-size: 100
  ui:
    features:
      address:
        autocomplete: true
        verification: false
      pageBuilder:
        enabled: true
        page:
          library:
            enabled: true
          management:
            create:
              enabled: true
            edit:
              enabled: false
      report:
        execution:
          enabled: true

spring:
  graphql:
    graphiql:
      enabled: false
  liquibase:
    enabled: true

  main:
    allow-bean-definition-overriding: true

testing:
  id-generation:
    suffix: 'TEST'
    starting: -20000000 # a negative id should reduce conflicts of ids in a live system

logging:
  level:
    nbs:
      classic:
        outgoing: DEBUG
    gov:
      cdc:
        nbs:
          search: DEBUG
