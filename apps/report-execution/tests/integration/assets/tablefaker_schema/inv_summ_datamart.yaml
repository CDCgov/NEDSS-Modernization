config:
  seed: 42

tables:
  - table_name: "[RDB].[dbo].[INV_SUMM_DATAMART]"
    row_count: 1000
    columns:
      - column_name: INVESTIGATION_KEY
        type: int
        data: fake.unique.random_int(1, 1000000)
        null_percentage: 0
      
      - column_name: PATIENT_KEY
        type: int
        data: fake.random_int(1, 1000)
        null_percentage: 0
      
      - column_name: PATIENT_LOCAL_ID
        type: string
        data: str(fake.random_int(1, 100))
        null_percentage: 0.01
      
      - column_name: PATIENT_FIRST_NAME
        type: string
        data: fake.first_name()
        null_percentage: 0.05
      
      - column_name: PATIENT_LAST_NAME
        type: string
        data: fake.last_name()
        null_percentage: 0.05
      
      - column_name: PATIENT_DOB
        type: string
        data: fake.date_of_birth(minimum_age=0, maximum_age=100).strftime('%Y-%m-%d')
        null_percentage: 0.05
      
      - column_name: INVESTIGATION_LOCAL_ID
        type: string
        data: fake.uuid4()[:15]
        null_percentage: 0.01
      
      - column_name: DISEASE
        type: string
        data: random.choice(["Pertussis", "Measles", "Salmonellosis", "COVID-19", "Hepatitis A"])
        null_percentage: 0.01
      
      - column_name: DISEASE_CD
        type: string
        data: random.choice(["10190", "10140", "502651", "10245", "10280", "10311"])
        null_percentage: 0.01
      
      - column_name: CASE_STATUS
        type: string
        data: random.choice(["Confirmed", "Probable", "Suspect", "Not a Case", None])
        null_percentage: 0.1
      
      - column_name: EVENT_DATE
        type: string
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5)).strftime('%Y-%m-%d')
        null_percentage: 0.02
      
      - column_name: EVENT_DATE_TYPE
        type: string
        data: random.choice(["Investigation Start Date", "Date of Report", "Specimen Collection Date", "Illness Onset Date"])
        null_percentage: 0.1
      
      - column_name: MMWR_YEAR
        type: string
        data: str(fake.random_int(2015, 2025))
        null_percentage: 0.1
      
      - column_name: NOTIFICATION_STATUS
        type: string
        data: random.choice(["COMPLETED", "PENDING", "REJECTED", None])
        null_percentage: 0.1