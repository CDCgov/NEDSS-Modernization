config:
  seed: 42
  nbs:
    fk_tables:

tables:
  - table_name: "[RDB].[dbo].[INV_SUMM_DATAMART]"
    row_count: 1000
    columns:
      # Primary key - bigint (must be unique, not null)
      - column_name: INVESTIGATION_KEY
        type: int
        data: fake.unique.random_int(1, 1000000)
        null_percentage: 0
      
      # bigint
      - column_name: PATIENT_KEY
        type: int
        data: fake.random_int(1, 1000)
        null_percentage: 0
      
      # varchar
      - column_name: PATIENT_LOCAL_ID
        type: string
        data: str(fake.random_int(1, 100))
        null_percentage: 0.01
      
      # varchar
      - column_name: INVESTIGATION_LOCAL_ID
        type: string
        data: fake.uuid4()[:15]
        null_percentage: 0.01
      
      # varchar
      - column_name: DISEASE
        type: string
        data: random.choice(["Pertussis", "Measles", "Salmonellosis", "COVID-19", "Hepatitis A"])
        null_percentage: 0.01
      
      # varchar
      - column_name: DISEASE_CD
        type: string
        data: random.choice(["10190", "10140", "502651", "10245", "10280", "10311"])
        null_percentage: 0.01
      
      # datetime
      - column_name: EVENT_DATE
        type: string
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5))
        null_percentage: 0.02
      
      # varchar
      - column_name: CASE_STATUS
        type: string
        data: random.choice(["Confirmed", "Probable", "Suspect", "Not a Case", None])
        null_percentage: 0.1
      
      # varchar
      - column_name: INVESTIGATION_STATUS
        type: string
        data: random.choice(["Open", "Closed", "Pending", None])
        null_percentage: 0.05
      
      # datetime
      - column_name: INVESTIGATION_CREATE_DATE
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5))
        null_percentage: 0.05
      
      # datetime
      - column_name: EARLIEST_RPT_TO_CNTY_DT
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5))
        null_percentage: 0.1
      
      # datetime
      - column_name: EARLIEST_RPT_TO_STATE_DT
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5))
        null_percentage: 0.1
      
      # datetime
      - column_name: DIAGNOSIS_DATE
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5))
        null_percentage: 0.1
      
      # datetime
      - column_name: ILLNESS_ONSET_DATE
        data: fake.date_between(start_date=date(2015, 1, 1), end_date=date(2025, 1, 5))
        null_percentage: 0.1
      
      # numeric (decimal)
      - column_name: MMWR_WEEK
        type: float
        data: fake.random_int(1, 52)
        null_percentage: 0.1
      
      # numeric (decimal)
      - column_name: MMWR_YEAR
        type: float
        data: fake.random_int(2015, 2025)
        null_percentage: 0.1
      
      # varchar
      - column_name: PROGRAM_AREA
        type: string
        data: random.choice(["GCD", "FOOD", "STD", "TB", None])
        null_percentage: 0.1
      
      # varchar
      - column_name: JURISDICTION_NM
        type: string
        data: random.choice(["Georgia", "Tennessee", "Alabama", "Florida", None])
        null_percentage: 0.1