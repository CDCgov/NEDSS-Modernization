config:
  seed: 31
  nbs:
    fk_tables:
      - '[RDB].[dbo].[CONFIRMATION_METHOD_GROUP]'
      - '[RDB].[dbo].[CASE_COUNT]'

tables:
  - table_name: "[RDB].[dbo].[INVESTIGATION]"
    row_count: 60
    columns:
      - column_name: investigation_key
        data: row_id
        is_primary_key: true
      - column_name: inv_case_status
        data: fake.random_element(["Confirmed", "Probable", "Suspect", "Unknown"])
      - column_name: record_status_cd
        data: fake.random_element(["ACTIVE", "INACTIVE"])
      - column_name: inv_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          return f"CAS100{id_num}GA01"

  - table_name: "[RDB].[dbo].[D_PROVIDER]"
    row_count: 250
    columns:
      - column_name: provider_key
        data: row_id
        is_primary_key: true
      - column_name: provider_quick_code
        data: random.choice(["dekalb", "fulton", "JLJ", "local", "pks", "state"])
        null_percentage: 0.25
      - column_name: provider_first_name
        data: fake.first_name()
        null_percentage: 0.05
      - column_name: provider_last_name
        data: fake.last_name()
        null_percentage: 0.05
      - column_name: provider_name_suffix
        data: fake.random_element(["Jr.", "Sr.", "II", "III", "MD", "PhD"])
        null_percentage: 0.98

  - table_name: "[RDB].[dbo].[D_ORGANIZATION]"
    row_count: 50
    columns:
      - column_name: organization_key
        data: row_id
        is_primary_key: true
      - column_name: organization_name
        type: string
        data: |
          return f"{fake.last_name()} Medical Center"

  - table_name: "[RDB].[dbo].[D_INTERVIEW]"
    row_count: 60
    columns:
      - column_name: d_interview_key
        data: row_id
        is_primary_key: true
      - column_name: record_status_cd
        data: random.choice(["ACTIVE", "ACTIVE", "ACTIVE", "LOG_DEL"])
      - column_name: local_id
        data: |
          return f"IX{100000 + row_id}"
      - column_name: ix_type
        data: |
          return random.choices(
            ["Initial/Original", "Re-Interview", "Cluster", "Field Follow-up"],
            weights=[70, 20, 5, 5]
          )[0]
      - column_name: ix_location
        data: random.choices(["Clinic", "Field", "Telephone"], weights=[55, 35, 10])[0]
      - column_name: ix_date
        data: fake.date_between(start_date=date(2024, 1, 1), end_date=date(2024, 3, 31))

  - table_name: "[RDB].[dbo].[F_INTERVIEW_CASE]"
    row_count: 60
    columns:
      - column_name: investigation_key
        data: row_id
      - column_name: d_interview_key
        data: row_id
      - column_name: ix_interviewer_key
        data: 1

  - table_name: "[RDB].[dbo].[STD_HIV_DATAMART]"
    row_count: 60
    columns:
      - column_name: investigation_key
        data: row_id
      - column_name: patient_name
        data: |
          return f"{fake.last_name()}, {fake.first_name()}"
        null_percentage: 0.05
      - column_name: patient_age_reported
        data: |
          age_num = fake.random_int(1, 99)
          suffix = random.choice([" years", " Years"]) if random.random() < 0.2 else ""
          return f"{age_num}{suffix}"
        null_percentage: 0.05
      - column_name: patient_sex
        data: random.choice(["Female", "Male", ""]) if random.random() < .95 else None
      - column_name: patient_race
        data: random.choice(["B", "A", "AI", "W", ""]) if random.random() < .95 else None
      - column_name: patient_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          pre_id_num = random.choice([100, 200, 300])
          return f"PSN{pre_id_num}{id_num}GA01"
      - column_name: inv_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          return f"CAS100{id_num}GA01"
      - column_name: ca_patient_intv_status
        data: |
          return random.choices(
            ["I - Interviewed", "A - Awaiting", "R - Refused Interview", "U - Unable to Locate", "O - Other", None],
            weights=[65, 10, 7, 7, 6, 5]
          )[0]
      - column_name: init_fup_internet_foll_up_cd
        data: random.choice(["Y", "N"])
      - column_name: fl_fup_internet_outcome_cd
        data: random.choice(["I1", "I2", "I3", "I4", "I5", "I6", "I7"]) if random.random() < .95 else None
      - column_name: investigator_interview_key
        data: 1
      - column_name: investigator_interview_qc
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05
      - column_name: field_record_number
        data: |
          return 90000000 + row_id
      - column_name: ca_interviewer_assign_dt
        data: |
          return date(2024, 1, min(row_id, 28))
      - column_name: cc_closed_dt
        data: |
          return date(2024, 2, min(row_id, 28))
      - column_name: fl_fup_init_assgn_dt
        data: fake.date_between(start_date=date(2024, 1, 1), end_date=date(2024, 3, 31))
        null_percentage: 0.15
      - column_name: ix_date_oi
        data: fake.date_between(start_date=date(2018, 5, 5), end_date=date(2025, 1, 5))
        null_percentage: 0.05
      - column_name: program_jurisdiction_oid
        data: random.choice(["1300400010", "1300400011", "1300400008", "1300400009", "1300400014", "1300400015", "1300400012"])
      - column_name: diagnosis_cd
        data: random.choice(["100","200","300","350","400","410","420","450","460","470","480","490","500","600","710","720","730","740","745","750","790","800","850","900","950"]) if random.random() < .95 else None
      - column_name: condition_cd
        data: random.choice(["100","200","300","350","400","410","420","450","460","470","480","490","500","600","710","720","730","740","745","750","790","800","850","900","950"]) if random.random() < .95 else None
      - column_name: std_prtnrs_prd_trnsgndr_ttl
        data: str(random.randint(0, 4))
      - column_name: soc_prtnrs_prd_fml_ttl
        data: str(random.randint(0, 4))
      - column_name: soc_prtnrs_prd_male_ttl
        data: str(random.randint(0, 4))
      - column_name: confirmation_dt
        data: fake.date_between(start_date=date(2018, 5, 5), end_date=date(2025, 1, 5))
      - column_name: jurisdiction_nm
        type: string
        data: random.choice(["Washington County", "Middlesex County"]) if random.random() < .95 else None
      - column_name: physician_key
        data: foreign_key("[RDB].[dbo].[D_PROVIDER]", "provider_key")
      - column_name: ordering_facility_key
        data: foreign_key("[RDB].[dbo].[D_ORGANIZATION]", "organization_key")
      - column_name: patient_pregnant_ind
        data: random.choices(["No", "Yes", None], weights=[90, 5, 5])[0]
      - column_name: pbi_preg_in_last_12mo_ind
        data: random.choices(["No", "Yes", None], weights=[90, 5, 5])[0]
      - column_name: pbi_preg_at_ix_ind
        data: random.choices(["No", "Yes", None], weights=[90, 5, 5])[0]
      - column_name: pbi_preg_at_exam_ind
        data: random.choices(["No", "Yes", None], weights=[90, 5, 5])[0]

  - table_name: "[RDB].[dbo].[D_CONTACT_RECORD]"
    row_count: 40
    columns:
      - column_name: d_contact_record_key
        data: row_id
        is_primary_key: true
      - column_name: local_id
        data: |
          return f"CTRPA03{row_id:03d}"
      - column_name: record_status_cd
        data: random.choice(["ACTIVE", "INACTIVE"])
      - column_name: record_status_time
        data: |
          return datetime(2024, 3, min(row_id, 28), 8, 0, 0)
      - column_name: ctt_referral_basis
        data: random.choice(["P1 - Partner, Sex", "S1 - Social Contact 1", "A1 - Associate 1", "P2 - Partner, Needle-Sharing"])
      - column_name: ctt_processing_decision
        data: random.choice(["Field Follow-up", "Secondary Referral", "Record Search Closure"])
      - column_name: add_time
        data: |
          return datetime(2024, 1, min(row_id, 28), 9, 0, 0)
      - column_name: last_chg_time
        data: |
          return datetime(2024, 2, min(row_id, 28), 9, 0, 0)

  - table_name: "[RDB].[dbo].[F_CONTACT_RECORD_CASE]"
    row_count: 40
    columns:
      - column_name: d_contact_record_key
        data: row_id
      - column_name: subject_investigation_key
        data: foreign_key("[RDB].[dbo].[INVESTIGATION]", "investigation_key")
      - column_name: contact_investigation_key
        data: foreign_key("[RDB].[dbo].[INVESTIGATION]", "investigation_key")
      - column_name: third_party_entity_key
        data: 1
      - column_name: contact_key
        data: |
          return 1000 + row_id
      - column_name: subject_key
        data: |
          return 2000 + (1 if row_id in (1, 2, 3) else 2)
      - column_name: third_party_investigation_key
        data: 1
      - column_name: contact_interview_key
        data: foreign_key("[RDB].[dbo].[D_INTERVIEW]", "d_interview_key")
      - column_name: dispositioned_by_key
        data: 1
      - column_name: contact_exposure_site_key
        data: 1
      - column_name: contact_investigator_key
        data: foreign_key("[RDB].[dbo].[D_PROVIDER]", "provider_key")
