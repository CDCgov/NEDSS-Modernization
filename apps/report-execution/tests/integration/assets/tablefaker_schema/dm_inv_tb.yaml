config:
  seed: 5
  nbs:
    fk_tables: []

tables:
  - table_name: "[RDB].[dbo].[DM_INV_TB]"
    row_count: 500
    columns:
      - column_name: INVESTIGATION_KEY
        data: row_id
      - column_name: program_jurisdiction_oid
        data: random.choice(["1300400010", "1300400011", "1300400008", "1300400009", "1300400014", "1300400015", "1300400012"])
      - column_name: INV_RPT_DT
        data: fake.date_between(start_date=date(2018, 5, 5), end_date=date(2025, 1, 5))
      - column_name: PREV_COUNT_CASE
        data: 'random.choice(["No", "Verified Case: Counted by another US area"])'
      - column_name: DISEASE_CD
        data: 102201

      # Renamed to CASE_VERIFICATION_DESC in Case_Verification_Report.sas
      - column_name: CASE_VERIFCTON_CAT
        data: |
          random.choice([
            "0 - Not a Verified Case",
            "1 - Positive Culture",
            "1A - Positive NAA",
            "2 - Positive Smear/Tissue",
            "3 - Clinical Case Definition",
            "4 - Provider Diagnosis",
            "5 - Suspect"
          ])

      # Renamed to DISEASE_SITE_DESC in Case_Verification_Report.sas
      - column_name: DISEASE_SITE
        data: |
          # comments are the matching calculated DISEASE_SITE_VALUE
          return random.choice([
            # Extrapulmonary TB only
            "Spinal cord",
            "Nose|Trachea",

            # Pulmonary TB only
            "Pleural|Lymphatic Intrathoracic",
            "Pleural",

            # Both Extrapulmonary TB and Pulmonary TB
            "Stomach|Lymphatic Intrathoracic",
            "Lymphatic Intrathoracic|Spinal cord",

            # Uknown and either Extrapulmonary or Pulmonary TB
            "Site not Stated|Spinal cord",
            "Site not Stated|Pleural",

            # Unknown only
            "Site not Stated",

            # Missing value
            None
          ])
