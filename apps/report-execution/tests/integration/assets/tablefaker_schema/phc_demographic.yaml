config:
  seed: 4
  nbs:
    fk_tables:
      - '[NBS_ODSE].[dbo].[SubjectRaceInfo]'

tables:
  # Table backing PHCDemographic view
  - table_name: "[NBS_ODSE].[dbo].[PublicHealthCaseFact]"
    row_count: 1000
    columns:
      # required columns:
      - column_name: public_health_case_uid
        data: row_id
        is_primary_key: true
      - column_name: case_class_cd
        data: random.choice(["N", "C", ""])
      - column_name: PHC_code
        data: random.choice(["10190", "10140", "502651"])
      - column_name: PHC_code_desc
        data: |
          if PHC_code == "10190":
            return "Pertussis"
          elif PHC_code == "10140":
            return "Measles"
          elif PHC_code == "502651":
            return "Salmonellosis"
      - column_name: prog_area_cd
        data: |
          if PHC_code in ("10190", "10140"):
            return "GCD"
          elif PHC_code == "502651":
            return "FOOD"

      # Case basics
      - column_name: PHC_code_short_desc
        type: string
        data: PHC_code_desc
      - column_name: event_date 
        data: fake.date_between(start_date=date(2019, 5, 5), end_date=date(2025, 5, 5))
        null_percentage: 0.05
      - column_name: group_case_cnt
        data: fake.random_int(1, 90)
        null_percentage: 0.05

      # Location
      - column_name: state
        type: string
        data: random.choice(["Georgia", "Tennessee"]) if random.random() < .95 else None
      - column_name: state_cd
        type: string
        data: |
          if state == "Georgia":
            return "13"
          elif state == "Tennessee":
            return "47"
          else:
            return None
  
