config:
  seed: 4
  nbs:
    fk_tables:
      - "[RDB].[dbo].[CONFIRMATION_METHOD_GROUP]"

tables:
  - table_name: "[RDB].[dbo].[INVESTIGATION]"
    row_count: 1000
    columns:
      - column_name: investigation_key
        data: row_id
        is_primary_key: true
      - column_name: inv_case_status
        data: fake.random_element(["Confirmed", "Probable", "Suspect", "Unknown"])
        null_percentage: 0
      - column_name: record_status_cd
        data: fake.random_element(["ACTIVE", "INACTIVE"])
        null_percentage: 0
      - column_name: inv_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          return f"CAS100{id_num}GA01"
      - column_name: CASE_UID
        data: row_id + 10000000
        null_percentage: .05

  - table_name: "[RDB].[dbo].[D_PROVIDER]"
    row_count: 250
    columns:
      - column_name: provider_key
        data: row_id
        is_primary_key: true
      - column_name: provider_first_name
        data: fake.first_name()
        null_percentage: 0.05
      - column_name: provider_last_name
        data: fake.last_name()
        null_percentage: 0.05
      - column_name: provider_name_suffix
        data: fake.random_element(["Jr.", "Sr.", "II", "III", "MD", "PhD"])
        null_percentage: 0.98

  - table_name: "[RDB].[dbo].[D_ORGANIZATION]"
    row_count: 50
    columns:
      - column_name: organization_key
        data: row_id
        is_primary_key: true
      - column_name: organization_name
        type: string
        data: |
          return f"{fake.last_name()} Medical Center"

  - table_name: "[RDB].[dbo].[LAB_TEST]"
    row_count: 200
    columns:
      - column_name: lab_test_key
        data: row_id + 10000
        is_primary_key: true
      - column_name: specimen_collection_dt
        data: fake.date_between(start_date=datetime(2020, 1, 1), end_date=datetime(2025, 12, 31))
        null_percentage: 0.1
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])

  - table_name: "[RDB].[dbo].[MORBIDITY_REPORT_EVENT]"
    row_count: 500
    columns:
      - column_name: NURSING_HOME_KEY
        data: 1
        null_percentage: 0
      - column_name: HEALTH_CARE_KEY
        data: 1
        null_percentage: 0
      - column_name: MORB_RPT_CREATE_DT_KEY
        data: fake.random_int(10000, 20000)
        null_percentage: 0
      - column_name: HSPTL_DISCHARGE_DT_KEY
        data: 1
        null_percentage: 0
      - column_name: ILLNESS_ONSET_DT_KEY
        data: fake.random_int(10000, 20000)
        null_percentage: 0
      - column_name: MORB_RPT_SRC_ORG_KEY
        data: fake.random_element([2, 3, 4, 5])
        null_percentage: 0
      - column_name: PATIENT_KEY
        data: row_id + 500
        null_percentage: 0
      - column_name: MORB_RPT_KEY
        data: row_id + 20000
        is_primary_key: true
      - column_name: MORB_RPT_DT_KEY
        data: fake.random_int(10000, 20000)
        null_percentage: 0
      - column_name: PHYSICIAN_KEY
        data: fake.random_element([1, 2, 3, 4, 5])
        null_percentage: 0
      - column_name: REPORTER_KEY
        data: fake.random_element([1, 2, 3, 4, 5, 6])
        null_percentage: 0
      - column_name: HSPTL_KEY
        data: fake.random_element([1, 2, 3, 4, 5])
        null_percentage: 0
      - column_name: MORB_RPT_COUNT
        data: 1
        null_percentage: 0
      - column_name: INVESTIGATION_KEY
        data: row_id
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
        null_percentage: 0
      - column_name: CONDITION_KEY
        data: fake.random_int(20, 300)
        null_percentage: 0
      - column_name: LDF_GROUP_KEY
        data: fake.random_int(1, 60)
        null_percentage: 0
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])
        null_percentage: 0

  - table_name: "[RDB].[dbo].[MORBIDITY_REPORT]"
    row_count: 1000
    columns:
      - column_name: morb_rpt_key
        data: row_id + 20000
        foreign_key:
          table: "[RDB].[dbo].[MORBIDITY_REPORT_EVENT]"
          column: MORB_RPT_KEY
      - column_name: diagnosis_dt
        data: fake.date_between(start_date=datetime(2020, 1, 1), end_date=datetime(2025, 12, 31))
        null_percentage: 0.1
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])

  - table_name: "[RDB].[dbo].[STD_HIV_DATAMART]"
    row_count: 1000
    columns:
      - column_name: investigation_key
        data: row_id
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
        null_percentage: 0

      - column_name: patient_name
        data: |
          # Use first 50 rows for controlled duplicates (but only 6 of them are the test patient)
          if row_id < 6:
              return "Duplicates, Test"
          else:
              # Fill with realistic names for the rest of the test block
              names = ["Smith, John", "Doe, Jane", "Johnson, Mike", "Brown, Lisa", "Davis, Tom", "Miller, Amy"]
              return fake.random_element(names) if fake.random_int(1, 100) <= 95 else None


      - column_name: patient_age_reported
        data: |
          age_num = fake.random_int(1, 99)
          if fake.random_int(1, 100) <= 95:
              suffix = fake.random_element([" Years", " Months", " Days"])
              return f"{age_num}{suffix}"
          else:
              return "."

      - column_name: patient_sex
        data: fake.random_element(["Female", "Male", ""])
        null_percentage: 0.1

      - column_name: patient_race
        data: fake.random_element(["B", "A", "AI", "W", ""])
        null_percentage: 0.1

      - column_name: patient_local_id
        data: |
              names_to_id = {
                  "Duplicates, Test": "PSN10010099GA01",
                  "Smith, John": "PSN10010001GA01",
                  "Doe, Jane": "PSN10010002GA01",
                  "Johnson, Mike": "PSN10010003GA01",
                  "Brown, Lisa": "PSN10010004GA01",
                  "Davis, Tom": "PSN10010005GA01",
                  "Miller, Amy": "PSN10010006GA01",
              }
              return names_to_id.get(patient_name)

      - column_name: diagnosis_cd
        data: |
          # For the controlled test patient (first 6 rows), force diagnosis '200'
          if row_id < 6:
              return '200'
          else:
              return fake.random_element(['200', '300', '710', '720', '730', '790', '900']) if fake.random_int(1,100) <= 90 else None
      
      - column_name: diagnosis
        data: |
          '200 - Chlamydia' if diagnosis_cd == '200' else '300 - Gonorrhea' if diagnosis_cd == '300' else '710 - Syphilis, primary' if diagnosis_cd == '710' else '720 - Syphilis, secondary' if diagnosis_cd == '720' else '730 - Syphilis, Early Non-Primary, Non-Secondary' if diagnosis_cd == '730' else '790 - Syphilis, Congenital' if diagnosis_cd == '790' else '900 - HIV Infection' if diagnosis_cd == '900' else None

      - column_name: field_record_number
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05

      - column_name: investigator_interview_qc
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05

      - column_name: ca_interviewer_assign_dt
        data: fake.date_between(start_date=datetime(2018, 5, 5), end_date=datetime(2025, 1, 5))
        null_percentage: 0.05

      - column_name: cc_closed_dt
        data: fake.date_between(start_date=datetime(2018, 5, 5), end_date=datetime(2025, 1, 5))
        null_percentage: 0.05

      - column_name: ix_date_oi
        data: fake.date_between(start_date=datetime(2018, 5, 5), end_date=datetime(2025, 1, 5))
        null_percentage: 0.05

      - column_name: ca_patient_intv_status
        data: fake.random_element(["I - Interviewed"]) if fake.random_int(1,100) <= 10 else None

      - column_name: program_jurisdiction_oid
        data: fake.random_element(["1300400010", "1300400011", "1300400008", "1300400009", "1300400014", "1300400015", "1300400012"])

      - column_name: confirmation_dt
        data: fake.date_between(start_date=datetime(2020, 1, 1), end_date=datetime(2025, 12, 31))

      - column_name: jurisdiction_nm
        type: string
        data: fake.random_element(["Washington County", "Middlesex County"]) if fake.random_int(1,100) <= 95 else None

      - column_name: physician_key
        data: foreign_key("[RDB].[dbo].[D_PROVIDER]", "provider_key")

      - column_name: inv_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          return f"CAS100{id_num}GA01"
        null_percentage: 0

      - column_name: inv_case_status
        data: |
          # Force the 6 test rows to be 'Confirmed'
          if row_id < 6:
              return 'Confirmed'
          else:
              return copy_from_fk("[RDB].[dbo].[INVESTIGATION]", "investigation_key", "inv_case_status")

      - column_name: ordering_facility_key
        data: foreign_key("[RDB].[dbo].[D_ORGANIZATION]", "organization_key")

      - column_name: patient_pregnant_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: pbi_preg_in_last_12mo_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: pbi_preg_at_ix_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: pbi_preg_at_exam_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: investigator_interview_key
        data: fake.random_int(10000000, 99999999)
      - column_name: investigator_interview_qc
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05
      - column_name: fl_fup_investigator_assgn_dt
        data: fake.date_between(start_date=date(2020, 1, 1), end_date=date(2025, 12, 31))
        null_percentage: 0.05
      - column_name: fl_fup_dispo_dt
        data: fake.date_between(start_date=date(2020, 1, 1), end_date=date(2025, 12, 31))
        null_percentage: 0.05
      - column_name: investigator_fl_fup_key
        data: fake.random_int(1, 300)
        null_percentage: 0.05
      - column_name: investigator_fl_fup_qc
        data: fake.random_element(['1', '2', '3', '4', '5', 'dekalb', 'fulton', 'local', 'pks', 'state'])
        null_percentage: 0.05
      - column_name: investigator_disp_fl_fup_key
        data: fake.random_int(1, 10)
        null_percentage: 0.01
      - column_name: fl_fup_disposition
        data: |
          disposition_values = [
              "1 - Prev. Pos",
              "2 - Prev. Neg, New Pos",
              "5 - No Prev Test, New Pos",
              "A - Preventative Treatment",
              "B - Refused Preventative Treatment",
              "C - Infected, Brought to Treatment",
              "D - Infected, Not Treated",
              "E - Previously Treated for This Infection",
              "F - Not Infected",
              "G - Insufficient Info to Begin Investigation",
              "H - Unable to Locate",
              "J - Located, Not Examined and/or Interviewed",
              "K - Sent Out Of Jurisdiction",
              "L - Other"
            ]
          return fake.random_element(disposition_values)
        null_percentage: 0.1

      - column_name: referral_basis
        data: |
          # For test rows, set to NULL to use fl_fup_exam_dt directly
          if row_id < 6:
              return None
          else:
              return fake.random_element(["T1 - Positive Test", "T2 - Morbidity Report", None])
        null_percentage: 0.2

      - column_name: fl_fup_exam_dt
        data: |
          base = date(2023, 1, 1)

          # Controlled test rows: first 6 rows form three clusters of 2 rows each
          if row_id < 6:
              cluster = row_id // 2   # 0, 1, 2
              pos = row_id % 2        # 0 or 1
              if cluster == 0:
                  gap = 25
              elif cluster == 1:
                  gap = 55
              else:
                  gap = 85
              cluster_offset = cluster * 1000   # separate clusters by 1000 days
              return base + timedelta(days=cluster_offset + pos * gap)

          # For all other rows, we want to avoid accidental duplicates within the same patient/diagnosis.
          # Use a wide random spread (0–3650 days) and add a unique increment based on row_id.
          else:
              # Ensure that for the same patient_name/diagnosis, the dates are effectively unique.
              # We'll use a large random offset plus a deterministic per-row factor.
              offset = (row_id * 31) % 3650
              return base + timedelta(days=offset)
        null_percentage: 0.1
  - table_name: "[RDB].[dbo].[LAB_TEST_RESULT]"
    row_count: 200
    columns:
      - column_name: LAB_TEST_KEY
        data: row_id + 10000
        foreign_key:
          table: "[RDB].[dbo].[LAB_TEST]"
          column: LAB_TEST_KEY
      - column_name: INVESTIGATION_KEY
        data: row_id
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])
      - column_name: RESULT_COMMENT_GRP_KEY
        data: row_id + 40000
      - column_name: TEST_RESULT_GRP_KEY
        data: row_id + 50000
      - column_name: PERFORMING_LAB_KEY
        data: row_id + 60000
      - column_name: PATIENT_KEY
        data: row_id + 70000
      - column_name: COPY_TO_PROVIDER_KEY
        data: row_id + 80000
      - column_name: LAB_TEST_TECHNICIAN_KEY
        data: row_id + 90000
      - column_name: SPECIMEN_COLLECTOR_KEY
        data: row_id + 100000
      - column_name: ORDERING_ORG_KEY
        data: row_id + 110000
      - column_name: REPORTING_LAB_KEY
        data: row_id + 120000
      - column_name: CONDITION_KEY
        data: row_id + 130000
      - column_name: LAB_RPT_DT_KEY
        data: row_id + 140000
      - column_name: MORB_RPT_KEY
        data: row_id + 150000
      - column_name: LDF_GROUP_KEY
        data: row_id + 160000
      - column_name: ORDERING_PROVIDER_KEY
        data: row_id + 170000

  - table_name: "[RDB].[dbo].[TREATMENT_EVENT]"
    row_count: 160
    columns:
      - column_name: TREATMENT_KEY
        data: row_id + 20000
        is_primary_key: true
      - column_name: INVESTIGATION_KEY
        data: row_id if row_id <= 100 else row_id + 100
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])
      - column_name: TREATMENT_DT_KEY
        data: row_id + 180000
      - column_name: TREATMENT_PROVIDING_ORG_KEY
        data: row_id + 190000
      - column_name: PATIENT_KEY
        data: row_id + 70000
      - column_name: MORB_RPT_KEY
        data: row_id + 150000
      - column_name: TREATMENT_PHYSICIAN_KEY
        data: row_id + 200000
      - column_name: CONDITION_KEY
        data: row_id + 130000
      - column_name: LDF_GROUP_KEY
        data: row_id + 160000
  
  - table_name: "[RDB].[dbo].[EVENT_METRIC]"
    row_count: 1000
    columns:
      - column_name: EVENT_TYPE
        data: fake.random_element(["CONTACT", "LabReport", "MorbReport", "Notification", "PHCInvForm", "Vaccination"])
      - column_name: EVENT_UID
        data: row_id + 10000000
        is_primary_key: true
      - column_name: ADD_USER_ID
        data: row_id + 10000000
        null_percentage: .05
  
  - table_name: "[RDB].[dbo].[USER_PROFILE]"
    row_count: 1000
    columns:
      - column_name: NEDSS_ENTRY_ID
        data: row_id + 10000000
        is_primary_key: true
      - column_name: PROVIDER_QUICK_CODE
        data: fake.random_element(["Lord Farquaad", "Shrek", "Fiona", "Puss in Boots", "Donkey", None])
      - column_name: PROVIDER_KEY
        data: |
          if PROVIDER_QUICK_CODE == "Lord Farquaad":
              return 1
          elif PROVIDER_QUICK_CODE == "Shrek":
              return 2
          elif PROVIDER_QUICK_CODE == "Fiona":
              return 3
          elif PROVIDER_QUICK_CODE == "Puss in Boots":
              return 4
          elif PROVIDER_QUICK_CODE == "Donkey":
              return 5
          else:
              return 6