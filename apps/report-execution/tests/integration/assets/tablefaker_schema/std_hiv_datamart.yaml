config:
  seed: 4
  nbs:
    fk_tables:
      - "[RDB].[dbo].[CONFIRMATION_METHOD_GROUP]"
      - "[RDB].[dbo].[CASE_COUNT]"

tables:
  - table_name: "[RDB].[dbo].[INVESTIGATION]"
    row_count: 1000
    columns:
      - column_name: investigation_key
        data: row_id
        is_primary_key: true
      - column_name: inv_case_status
        data: |
          # Rows 1-6 back STD_HIV_DATAMART's controlled duplicate-case test
          # patient (see std_hiv_datamart's patient_name/fl_fup_exam_dt) --
          # force Confirmed so joins through INVESTIGATION (e.g. qa_07) don't
          # depend on a lucky random draw.
          if row_id <= 6:
              return "Confirmed"
          return fake.random_element(["Confirmed", "Probable", "Suspect", "Unknown"])
        null_percentage: 0
      - column_name: record_status_cd
        data: fake.random_element(["ACTIVE", "INACTIVE"])
        null_percentage: 0
      - column_name: inv_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          return f"CAS100{id_num}GA01"
      - column_name: CASE_UID
        data: |
          # Never null for rows 1-6 (see inv_case_status above) -- handled
          # in-branch instead of via null_percentage so the controlled test
          # rows can't have their EVENT_METRIC/USER_PROFILE join broken by an
          # unlucky null draw.
          if row_id <= 6:
              return row_id + 10000000
          if random.randint(1, 100) <= 5:
              return None
          return row_id + 10000000
      - column_name: referral_basis
        data: |
          # For test rows, set to NULL to use fl_fup_exam_dt directly
          if row_id < 6 or fake.random_int(1, 100) >= 95:
              return None
          else:
              return fake.random_element(['P1 - Partner, Sex', 'P2 - Partner, Needle-Sharing','P3 - Partner, Both', "T1 - Positive Test", "T2 - Morbidity Report"])

  - table_name: "[RDB].[dbo].[D_PROVIDER]"
    row_count: 250
    columns:
      - column_name: provider_key
        data: row_id
        is_primary_key: true
      - column_name: provider_first_name
        data: fake.first_name()
        null_percentage: 0.05
      - column_name: provider_last_name
        data: fake.last_name()
        null_percentage: 0.05
      - column_name: provider_name_suffix
        data: fake.random_element(["Jr.", "Sr.", "II", "III", "MD", "PhD"])
        null_percentage: 0.98
      - column_name: provider_quick_code
        data: fake.lexify('test_???????')

  - table_name: "[RDB].[dbo].[D_ORGANIZATION]"
    row_count: 50
    columns:
      - column_name: organization_key
        data: row_id
        is_primary_key: true
      - column_name: organization_name
        type: string
        data: |
          return f"{fake.last_name()} Medical Center"

  - table_name: "[RDB].[dbo].[D_INTERVIEW]"
    row_count: 60
    columns:
      - column_name: d_interview_key
        data: row_id
        is_primary_key: true
      - column_name: record_status_cd
        data: random.choice(["ACTIVE", "ACTIVE", "ACTIVE", "LOG_DEL"])
      - column_name: local_id
        data: |
          return f"IX{100000 + row_id}"
      - column_name: ix_type
        data: |
          return random.choices(
            ["Initial/Original", "Re-Interview", "Cluster", "Field Follow-up"],
            weights=[70, 20, 5, 5]
          )[0]
      - column_name: ix_location
        data: random.choices(["Clinic", "Field", "Telephone"], weights=[55, 35, 10])[0]
      - column_name: ix_date
        data: fake.date_between(start_date=date(2024, 1, 1), end_date=date(2024, 3, 31))

  - table_name: "[RDB].[dbo].[LAB_TEST]"
    row_count: 200
    columns:
      - column_name: lab_test_key
        data: row_id + 10000
        is_primary_key: true
      - column_name: specimen_collection_dt
        data: fake.date_between(start_date=datetime(2020, 1, 1), end_date=datetime(2025, 12, 31))
        null_percentage: 0.1
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])

  - table_name: "[RDB].[dbo].[MORBIDITY_REPORT_EVENT]"
    row_count: 500
    columns:
      - column_name: NURSING_HOME_KEY
        data: 1
        null_percentage: 0
      - column_name: HEALTH_CARE_KEY
        data: 1
        null_percentage: 0
      - column_name: MORB_RPT_CREATE_DT_KEY
        data: fake.random_int(10000, 20000)
        null_percentage: 0
      - column_name: HSPTL_DISCHARGE_DT_KEY
        data: 1
        null_percentage: 0
      - column_name: ILLNESS_ONSET_DT_KEY
        data: fake.random_int(10000, 20000)
        null_percentage: 0
      - column_name: MORB_RPT_SRC_ORG_KEY
        data: fake.random_element([2, 3, 4, 5])
        null_percentage: 0
      - column_name: PATIENT_KEY
        data: row_id + 500
        null_percentage: 0
      - column_name: MORB_RPT_KEY
        data: row_id + 20000
        is_primary_key: true
      - column_name: MORB_RPT_DT_KEY
        data: fake.random_int(10000, 20000)
        null_percentage: 0
      - column_name: PHYSICIAN_KEY
        data: fake.random_element([1, 2, 3, 4, 5])
        null_percentage: 0
      - column_name: REPORTER_KEY
        data: fake.random_element([1, 2, 3, 4, 5, 6])
        null_percentage: 0
      - column_name: HSPTL_KEY
        data: fake.random_element([1, 2, 3, 4, 5])
        null_percentage: 0
      - column_name: MORB_RPT_COUNT
        data: 1
        null_percentage: 0
      - column_name: INVESTIGATION_KEY
        data: row_id
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
        null_percentage: 0
      - column_name: CONDITION_KEY
        data: fake.random_int(20, 300)
        null_percentage: 0
      - column_name: LDF_GROUP_KEY
        data: fake.random_int(1, 60)
        null_percentage: 0
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])
        null_percentage: 0

  - table_name: "[RDB].[dbo].[MORBIDITY_REPORT]"
    row_count: 1000
    columns:
      - column_name: morb_rpt_key
        data: row_id + 20000
        foreign_key:
          table: "[RDB].[dbo].[MORBIDITY_REPORT_EVENT]"
          column: MORB_RPT_KEY
      - column_name: diagnosis_dt
        data: fake.date_between(start_date=datetime(2020, 1, 1), end_date=datetime(2025, 12, 31))
        null_percentage: 0.1
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])

  - table_name: "[RDB].[dbo].[STD_HIV_DATAMART]"
    row_count: 1000
    columns:
      - column_name: investigation_key
        data: row_id
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
        null_percentage: 0

      - column_name: patient_name
        data: |
          # Use first 6 rows for controlled duplicates (the test patient)
          if row_id <= 6:
              return "Duplicates, Test"
          else:
              # Fill with realistic names for the rest of the test block
              names = ["Smith, John", "Doe, Jane", "Johnson, Mike", "Brown, Lisa", "Davis, Tom", "Miller, Amy"]
              return fake.random_element(names) if fake.random_int(1, 100) <= 95 else None


      - column_name: patient_age_reported
        data: |
          age_num = fake.random_int(1, 99)
          if fake.random_int(1, 100) <= 95:
              suffix = fake.random_element([" Years", " Months", " Days"])
              return f"{age_num}{suffix}"
          else:
              return "."

      - column_name: patient_sex
        data: fake.random_element(["Female", "Male", ""])
        null_percentage: 0.1

      - column_name: patient_race
        data: fake.random_element(["B", "A", "AI", "W", ""])
        null_percentage: 0.1

      - column_name: patient_local_id
        data: |
              names_to_id = {
                  "Duplicates, Test": "PSN10010099GA01",
                  "Smith, John": "PSN10010001GA01",
                  "Doe, Jane": "PSN10010002GA01",
                  "Johnson, Mike": "PSN10010003GA01",
                  "Brown, Lisa": "PSN10010004GA01",
                  "Davis, Tom": "PSN10010005GA01",
                  "Miller, Amy": "PSN10010006GA01",
              }
              return names_to_id.get(patient_name)

      - column_name: diagnosis_cd
        data: |
          # qa_07 groups duplicate-case detection by (PATIENT_LOCAL_ID,
          # DIAGNOSIS) and uses LAG() window functions that only look at each
          # row's nearest neighbor by date *within that partition*. Giving all
          # 3 controlled clusters (see fl_fup_exam_dt below) the same
          # diagnosis merges them into one partition, so the middle clusters'
          # rows are no longer adjacent to their own pair -- they're adjacent
          # to the *other* clusters' far-away dates instead, and never get
          # flagged. Each cluster needs its own diagnosis so its pair is the
          # only thing in its partition.
          if row_id <= 6:
              return ['200', '200', '300', '300', '710', '710'][row_id - 1]
          else:
              return fake.random_element(['200', '300', '710', '720', '730', '790', '900', '950']) if fake.random_int(1,100) <= 90 else None
      
      - column_name: diagnosis
        data: |
          '200 - Chlamydia' if diagnosis_cd == '200' else '300 - Gonorrhea' if diagnosis_cd == '300' else '710 - Syphilis, primary' if diagnosis_cd == '710' else '720 - Syphilis, secondary' if diagnosis_cd == '720' else '730 - Syphilis, Early Non-Primary, Non-Secondary' if diagnosis_cd == '730' else '790 - Syphilis, Congenital' if diagnosis_cd == '790' else '900 - HIV Infection' if diagnosis_cd == '900' else '950 - AIDS' if diagnosis_cd == '950' else None

      - column_name: field_record_number
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05

      - column_name: investigator_interview_qc
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05

      - column_name: ca_interviewer_assign_dt
        data: fake.date_between(start_date=datetime(2018, 5, 5), end_date=datetime(2025, 1, 5))
        null_percentage: 0.05

      - column_name: cc_closed_dt
        data: fake.date_between(start_date=datetime(2018, 5, 5), end_date=datetime(2025, 1, 5))
        null_percentage: 0.05

      - column_name: ix_date_oi
        data: fake.date_between(start_date=datetime(2018, 5, 5), end_date=datetime(2025, 1, 5))
        null_percentage: 0.05

      - column_name: ca_patient_intv_status
        data: |
          return random.choices(
            ["I - Interviewed", "A - Awaiting", "R - Refused Interview", "U - Unable to Locate", "O - Other", None],
            weights=[65, 10, 7, 7, 6, 5]
          )[0]

      - column_name: program_jurisdiction_oid
        data: fake.random_element(["1300400010", "1300400011", "1300400008", "1300400009", "1300400014", "1300400015", "1300400012"])

      - column_name: confirmation_dt
        data: fake.date_between(start_date=datetime(2020, 1, 1), end_date=datetime(2025, 12, 31))

      - column_name: jurisdiction_nm
        type: string
        data: fake.random_element(["Washington County", "Middlesex County"]) if fake.random_int(1,100) <= 95 else None

      - column_name: physician_key
        data: foreign_key("[RDB].[dbo].[D_PROVIDER]", "provider_key")

      - column_name: inv_local_id
        data: |
          id_num = fake.unique.random_int(10000, 99999)
          return f"CAS100{id_num}GA01"
        null_percentage: 0

      - column_name: inv_case_status
        data: |
          # Force the 6 test rows to be 'Confirmed'
          if row_id <= 6:
              return 'Confirmed'
          else:
              return copy_from_fk("[RDB].[dbo].[INVESTIGATION]", "investigation_key", "inv_case_status")

      - column_name: ordering_facility_key
        data: foreign_key("[RDB].[dbo].[D_ORGANIZATION]", "organization_key")

      - column_name: patient_pregnant_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: pbi_preg_in_last_12mo_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: pbi_preg_at_ix_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: pbi_preg_at_exam_ind
        data: |
          r = fake.random_int(1, 100)
          if r <= 90: return "No"
          elif r <= 95: return "Yes"
          else: return None

      - column_name: investigator_interview_key
        data: |
          # Ties to D_PROVIDER.provider_key / F_INTERVIEW_CASE.ix_interviewer_key
          # (both keyed 2-5 for rows 1-60) so PA05's worker-join queries have
          # matching activity to find.
          return 2 + ((row_id - 1) % 4)
      - column_name: investigator_interview_qc
        data: fake.random_int(10000000, 99999999)
        null_percentage: 0.05
      - column_name: fl_fup_investigator_assgn_dt
        data: fake.date_between(start_date=date(2020, 1, 1), end_date=date(2025, 12, 31))
        null_percentage: 0.05
      - column_name: fl_fup_dispo_dt
        data: fake.date_between(start_date=date(2020, 1, 1), end_date=date(2025, 12, 31))
        null_percentage: 0.05
      - column_name: investigator_fl_fup_key
        data: fake.random_int(1, 300)
        null_percentage: 0.05
      - column_name: investigator_fl_fup_qc
        data: fake.random_element(['1', '2', '3', '4', '5', 'dekalb', 'fulton', 'local', 'pks', 'state'])
        null_percentage: 0.05
      - column_name: investigator_disp_fl_fup_key
        data: fake.random_int(1, 10)
        null_percentage: 0.01
      - column_name: fl_fup_disposition
        data: |
          disposition_values = [
              "1 - Prev. Pos",
              "2 - Prev. Neg, New Pos",
              "5 - No Prev Test, New Pos",
              "A - Preventative Treatment",
              "B - Refused Preventative Treatment",
              "C - Infected, Brought to Treatment",
              "D - Infected, Not Treated",
              "E - Previously Treated for This Infection",
              "F - Not Infected",
              "G - Insufficient Info to Begin Investigation",
              "H - Unable to Locate",
              "J - Located, Not Examined and/or Interviewed",
              "K - Sent Out Of Jurisdiction",
              "L - Other"
            ]
          return fake.random_element(disposition_values)
        null_percentage: 0.1

      - column_name: referral_basis
        data: copy_from_fk("[RDB].[dbo].[INVESTIGATION]", "investigation_key", "referral_basis")

          
      - column_name: fl_fup_exam_dt
        data: |
          base = date(2023, 1, 1)

          # Controlled test rows: first 6 rows form three clusters of 2 rows
          # each (row_id is 1-based, so index from 0). Never null -- handled
          # in-branch below instead of via null_percentage -- so this
          # deterministic duplicate-pair scenario (used by qa_07) can't be
          # broken by an unlucky null draw regardless of what else changes
          # upstream in the shared random/Faker/numpy streams.
          if row_id <= 6:
              idx = row_id - 1        # 0-5
              cluster = idx // 2      # 0, 1, 2
              pos = idx % 2           # 0 or 1
              gap = [25, 55, 85][cluster]
              cluster_offset = cluster * 1000   # separate clusters by 1000 days
              return base + timedelta(days=cluster_offset + pos * gap)

          # For all other rows, we want to avoid accidental duplicates within the same patient/diagnosis.
          # Use a wide random spread (0–3650 days) and add a unique increment based on row_id.
          # ~10% return None directly (in place of null_percentage) for the same reason as above.
          if random.randint(1, 100) <= 10:
              return None
          offset = (row_id * 31) % 3650
          return base + timedelta(days=offset)

      - column_name: std_prtnrs_prd_trnsgndr_ttl
        data: str(random.randint(0, 4))

      - column_name: soc_prtnrs_prd_fml_ttl
        data: str(random.randint(0, 4))

      - column_name: soc_prtnrs_prd_male_ttl
        data: str(random.randint(0, 4))

      - column_name: hiv_900_test_ind
        data: random.choice(["Yes", "No"])

      - column_name: hiv_900_result
        data: |
          return random.choices(
            [
              "13-Positive/Reactive", "21-HIV-1 Pos", "22-HIV-1 Pos, Possible Acute",
              "23-HIV-2 Pos", "24-HIV-Undifferentiated", "12-Prelim Positive",
              "11-Negative", None,
            ],
            weights=[10, 10, 5, 5, 5, 5, 40, 20]
          )[0]

      - column_name: hiv_post_test_900_counseling
        data: random.choice(["Yes", "No"])

      - column_name: fl_fup_disposition
        data: |
          # PA04 HIV's 7 'examined' codes (1-7) and 7 'not examined' codes
          # (G, H, J, K, L, V, X), plus STD's own 6 'examined' codes (A-F)
          # and its extra 'not examined' code (Z) -- STD and HIV share the
          # G/H/J/K/L/V/X labels but use disjoint 'examined' vocabularies, so
          # both variants' rows are exercised from one shared column.
          return random.choices(
            [
              "1 - Prev. Pos", "2 - Prev. Neg, New Pos", "3 - Prev. Neg, Still Neg",
              "4 - Prev. Neg, No Test", "5 - No Prev Test, New Pos",
              "6 - No Prev Test, New Neg", "7 - No Prev Test, No Test",
              "A - Preventative Treatment", "B - Refused Preventative Treatment",
              "C - Infected, Brought to Treatment", "D - Infected, Not Treated",
              "E - Previously Treated for This Infection", "F - Not Infected",
              "G - Insufficient Info to Begin Investigation", "H - Unable to Locate",
              "J - Located, Not Examined and/or Interviewed",
              "K - Sent Out Of Jurisdiction", "L - Other",
              "V - Domestic Violence Risk", "X - Patient Deceased",
              "Z - Previous Preventative Treatment", None,
            ],
            weights=[
              5, 5, 5, 4, 4, 4, 4,
              5, 5, 5, 4, 4, 4,
              4, 4, 4, 3, 3, 3, 3, 3, 8,
            ]
          )[0]

  - table_name: "[RDB].[dbo].[F_INTERVIEW_CASE]"
    row_count: 60
    columns:
      - column_name: investigation_key
        data: row_id
      - column_name: d_interview_key
        data: row_id
      - column_name: ix_interviewer_key
        data: |
          return 2 + ((row_id - 1) % 4)

  - table_name: "[RDB].[dbo].[D_CONTACT_RECORD]"
    row_count: 200
    columns:
      - column_name: d_contact_record_key
        data: row_id
        is_primary_key: true
      - column_name: local_id
        data: |
          return f"CTR{row_id:03d}"
      - column_name: record_status_cd
        data: random.choice(["ACTIVE", "INACTIVE"])
      - column_name: record_status_time
        data: |
          return datetime(2024, 3, min(row_id, 28), 8, 0, 0)
      - column_name: ctt_referral_basis
        data: |
          # Includes 'C1- Cohort', which PA04 folds into its 'Clusters'
          # bucket alongside Social Contacts and Associates.
          return random.choice([
            "P1 - Partner, Sex", "P2 - Partner, Needle-Sharing", "P3 - Partner, Both",
            "S1 - Social Contact 1", "S2 - Social Contact 2", "S3 - Social Contact 3",
            "A1 - Associate 1", "A2 - Associate 2", "A3 - Associate 3",
            "C1- Cohort",
          ])
      - column_name: ctt_processing_decision
        data: random.choice(["Field Follow-up", "Secondary Referral", "Record Search Closure"])
      - column_name: add_time
        data: |
          return datetime(2024, 1, min(row_id, 28), 9, 0, 0)
      - column_name: last_chg_time
        data: |
          return datetime(2024, 2, min(row_id, 28), 9, 0, 0)

  - table_name: "[RDB].[dbo].[F_CONTACT_RECORD_CASE]"
    row_count: 200
    columns:
      - column_name: d_contact_record_key
        data: row_id
      - column_name: subject_investigation_key
        data: |
          # F_INTERVIEW_CASE only covers investigation_key 1-60 (its
          # row_count) -- PA04_Std's contact_query requires the subject case
          # to have a matching F_INTERVIEW_CASE row (a real INNER JOIN in the
          # SAS source, not a no-op like case_query's), so most contact
          # records need a subject in that range or STD's Partner/Cluster
          # metrics stay at 0. Bias toward it while keeping some variety.
          if random.random() < .85:
              return random.randint(1, 60)
          return foreign_key("[RDB].[dbo].[INVESTIGATION]", "investigation_key")
      - column_name: contact_investigation_key
        data: |
          # 1 is NBS's 'no contact yet' sentinel investigation key --
          # exercised by PA04's Val_C/Val_E ('Cases NCI') detection.
          if random.random() < .3:
              return 1
          return foreign_key("[RDB].[dbo].[INVESTIGATION]", "investigation_key")
      - column_name: third_party_entity_key
        data: 1
      - column_name: contact_key
        data: |
          return 1000 + row_id
      - column_name: subject_key
        data: |
          return 2000 + (1 if row_id in (1, 2, 3) else 2)
      - column_name: third_party_investigation_key
        data: 1
      - column_name: contact_interview_key
        data: |
          # 1 is NBS's 'no interview yet' sentinel D_INTERVIEW key -- exercised
          # by PA04_Std's contact_query, which excludes it (STD-only filter,
          # not present in the HIV variant's equivalent query).
          if random.random() < .2:
              return 1
          return foreign_key("[RDB].[dbo].[D_INTERVIEW]", "d_interview_key")
      - column_name: dispositioned_by_key
        data: 1
      - column_name: contact_exposure_site_key
        data: 1
      - column_name: contact_investigator_key
        data: foreign_key("[RDB].[dbo].[D_PROVIDER]", "provider_key")

  - table_name: "[RDB].[dbo].[LAB_TEST_RESULT]"
    row_count: 200
    columns:
      - column_name: LAB_TEST_KEY
        data: row_id + 10000
        foreign_key:
          table: "[RDB].[dbo].[LAB_TEST]"
          column: LAB_TEST_KEY
      - column_name: INVESTIGATION_KEY
        data: row_id
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])
      - column_name: RESULT_COMMENT_GRP_KEY
        data: row_id + 40000
      - column_name: TEST_RESULT_GRP_KEY
        data: row_id + 50000
      - column_name: PERFORMING_LAB_KEY
        data: row_id + 60000
      - column_name: PATIENT_KEY
        data: row_id + 70000
      - column_name: COPY_TO_PROVIDER_KEY
        data: row_id + 80000
      - column_name: LAB_TEST_TECHNICIAN_KEY
        data: row_id + 90000
      - column_name: SPECIMEN_COLLECTOR_KEY
        data: row_id + 100000
      - column_name: ORDERING_ORG_KEY
        data: row_id + 110000
      - column_name: REPORTING_LAB_KEY
        data: row_id + 120000
      - column_name: CONDITION_KEY
        data: row_id + 130000
      - column_name: LAB_RPT_DT_KEY
        data: row_id + 140000
      - column_name: MORB_RPT_KEY
        data: row_id + 150000
      - column_name: LDF_GROUP_KEY
        data: row_id + 160000
      - column_name: ORDERING_PROVIDER_KEY
        data: row_id + 170000

  - table_name: "[RDB].[dbo].[TREATMENT_EVENT]"
    row_count: 160
    columns:
      - column_name: TREATMENT_KEY
        data: row_id + 20000
        is_primary_key: true
      - column_name: INVESTIGATION_KEY
        data: row_id if row_id <= 100 else row_id + 100
        foreign_key:
          table: "[RDB].[dbo].[INVESTIGATION]"
          column: INVESTIGATION_KEY
      - column_name: RECORD_STATUS_CD
        data: fake.random_element(["ACTIVE", "INACTIVE"])
      - column_name: TREATMENT_DT_KEY
        data: row_id + 180000
      - column_name: TREATMENT_PROVIDING_ORG_KEY
        data: row_id + 190000
      - column_name: PATIENT_KEY
        data: row_id + 70000
      - column_name: MORB_RPT_KEY
        data: row_id + 150000
      - column_name: TREATMENT_PHYSICIAN_KEY
        data: row_id + 200000
      - column_name: CONDITION_KEY
