server:
  port: 8000

nbs:
  gateway:
    defaults:
      protocol: 'http'
    classic: '${nbs.gateway.defaults.protocol}://localhost:7001'
    home:
      uri: ${nbs.gateway.classic}
      base: '/nbs/HomePage.do?method=loadHomePage'
    ui:
      service: ${nbs.gateway.modernization.service}
      uri: '${nbs.gateway.defaults.protocol}://${nbs.gateway.ui.service}'
    modernization:
      service: 'localhost:8080'
      uri: '${nbs.gateway.defaults.protocol}://${nbs.gateway.modernization.service}'
    system:
      management:
        enabled: false
    patient:
      search:
        enabled: true
        service: 'localhost:8080'
      file:
        enabled: false
        service: 'localhost:8080'
    pagebuilder:
      enabled: false
      service: 'localhost:8095'
      page:
        library:
          enabled: false
        management:
          create:
            enabled: false
          edit:
            enabled: false
    deduplication:
      enabled: false
      service: 'localhost:8083'
      uri: '${nbs.gateway.defaults.protocol}://${nbs.gateway.deduplication.service}'
      merge:
        enabled: false
    report:
      execution:
        enabled: false

logging:
  level:
    redisratelimiter: ${nbs.gateway.log.level:INFO}
    reactor:
      netty: INFO
    org:
      springframework:
        security: ${nbs.gateway.security.log.level:INFO}
        cloud.gateway: ${nbs.gateway.log.level:INFO}
        http.server.reactive: ${nbs.gateway.log.level:INFO}
        web.reactive: ${nbs.gateway.log.level:INFO}
        boot.autoconfigure.web: ${nbs.gateway.log.level:INFO}

management:
  health:
    db:
      enabled: true
  endpoints:
    web:
      discovery:
        enabled: false
      exposure:
        include: health,info
      base-path: /~/
    access:
      default: read_only
  endpoint:
    health:
      access: read_only
    info:
      access: read_only
spring:
  threads:
    virtual:
      enabled: true
