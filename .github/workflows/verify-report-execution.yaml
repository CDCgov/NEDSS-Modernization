name: Verify Report Execution Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/report-execution/**"
      - ".github/workflows/verify-report-execution.yaml"
  pull_request:
    paths:
      - "apps/report-execution/**"
      - ".github/workflows/verify-report-execution.yaml"

jobs:
  unit_test:
    name: Lint & Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ./apps/report-execution
        run: uv sync --frozen

      - name: Validate formatting
        working-directory: ./apps/report-execution
        run: uv run ruff format --check

      - name: Run linter
        working-directory: ./apps/report-execution
        run: uv run ruff check
        
      - name: Run type check
        working-directory: ./apps/report-execution
        run: uv run pyrefly check --output-format=github

      - name: Run tests
        working-directory: ./apps/report-execution
        run: uv run pytest -m "not integration"

  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ./apps/report-execution
        run: uv sync --frozen

      - name: Run tests
        working-directory: ./apps/report-execution
        run: uv run --env-file sample.env pytest -m integration
